services:
  postgres:
    image: postgres:16
    container_name: mlflow-postgres
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflowpass
      POSTGRES_DB: mlflow
    volumes:
      - mlflow_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    container_name: mlflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - mlflow_minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    container_name: mlflow-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minio minioadmin; do sleep 1; done;
      /usr/bin/mc mb -p local/mlflow || true;
      /usr/bin/mc anonymous set private local/mlflow;
      exit 0;
      "

  mlflow:
    image: python:3.10-slim
    container_name: mlflow-server
    depends_on:
      - postgres
      - minio
      - minio-init
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      /bin/sh -c "pip install --no-cache-dir mlflow==2.14.3 psycopg2-binary boto3 &&
      mlflow server --backend-store-uri postgresql://mlflow:mlflowpass@postgres:5432/mlflow
      --default-artifact-root s3://mlflow/ --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"

volumes:
  mlflow_postgres_data:
  mlflow_minio_data:
